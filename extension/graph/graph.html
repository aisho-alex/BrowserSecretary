<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
    }
    
    #graph-container {
      width: 100vw;
      height: 100vh;
    }
    
    .controls {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 16px;
      border-radius: 12px;
      z-index: 100;
    }
    
    .controls h2 {
      font-size: 18px;
      margin-bottom: 12px;
    }
    
    .controls select {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      margin-right: 8px;
    }
    
    .controls button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #667eea;
      color: white;
      cursor: pointer;
      margin-right: 8px;
    }
    
    .controls button:hover {
      opacity: 0.9;
    }
    
    .node-info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 16px;
      border-radius: 12px;
      max-width: 400px;
      z-index: 100;
      display: none;
    }
    
    .node-info h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #667eea;
    }
    
    .node-info p {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
    }
    
    .node-info .tags {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .node-info .tag {
      background: rgba(102, 126, 234, 0.3);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
    }
    
    .stats {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="graph-container"></div>
  
  <div class="controls">
    <h2>🕸️ Knowledge Graph</h2>
    <select id="project-select">
      <option value="">All Projects</option>
    </select>
    <button id="refresh-btn">Refresh</button>
    <button id="download-btn">Download</button>
  </div>
  
  <div class="stats" id="stats">
    Nodes: <span id="node-count">0</span> | Edges: <span id="edge-count">0</span>
  </div>
  
  <div class="node-info" id="node-info">
    <h3 id="node-title"></h3>
    <p id="node-content"></p>
    <div class="tags" id="node-tags"></div>
  </div>
  
  <div class="loading" id="loading">Loading graph...</div>

  <!-- Vis.js Network (local copy) -->
  <script src="../lib/vis-network.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
